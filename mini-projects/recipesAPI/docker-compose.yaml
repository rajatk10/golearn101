version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: recipe_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: # enter password
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: recipe_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:

# this is used to spin up the required mongodb and redis containers
# MongoDB is used as the primary database
# Redis is used as the cache
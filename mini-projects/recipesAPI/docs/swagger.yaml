basePath: /
definitions:
  main.Recipe:
    properties:
      id:
        type: string
      ingredients:
        items:
          type: string
        type: array
      instructions:
        items:
          type: string
        type: array
      name:
        type: string
      publishedAt:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
host: localhost:8088
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample recipe management API.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Recipe API
  version: "1.0"
paths:
  /recipe:
    post:
      consumes:
      - application/json
      description: Adds a new recipe to the in-memory store
      parameters:
      - description: Recipe Data
        in: body
        name: recipe
        required: true
        schema:
          $ref: '#/definitions/main.Recipe'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.Recipe'
        "400":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new recipe
      tags:
      - recipes
  /recipe/{id}:
    delete:
      consumes:
      - application/json
      description: Delete the recipe by ID from the in-memory store
      parameters:
      - description: Recipe ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Recipe'
        "400":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete Recipe by ID from Recipes
      tags:
      - recipes
    get:
      consumes:
      - application/json
      description: Gets the recipe by ID from the in-memory store
      parameters:
      - description: Recipe ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Recipe'
        "400":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Recipe by ID
      tags:
      - recipes
    put:
      consumes:
      - application/json
      description: Update the recipe by ID from the in-memory store
      parameters:
      - description: Recipe ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Recipe'
        "400":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: UPDATE Recipe by ID
      tags:
      - recipes
  /recipes:
    get:
      consumes:
      - application/json
      description: Gets all the recipes from the in-memory store
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.Recipe'
            type: array
        "400":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get All Recipes
      tags:
      - recipes
swagger: "2.0"
